# minikv config
#
# Any key may be omitted to use its default. Lines beginning with '#' are
# comments. Whitespace around the key, '=', and value is trimmed.

# TCP address to listen on.
addr                = 0.0.0.0:11211

# HTTP address for net/http/pprof handlers; empty disables.
pprof-addr          =

# Number of independently-locked store shards.
shards              = 16

# Maximum bytes allowed in a single value.
max-value-bytes     = 1048576

# Maximum accounted key/value bytes before LRU eviction.
max-memory-bytes    = 67108864

# Per-item overhead included in memory accounting.
item-overhead-bytes = 64

# Interval for the periodic expired-key sweep; '0s' disables.
cleanup-interval    = 1m
