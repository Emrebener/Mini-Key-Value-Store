# minikv config
#
# Any key may be omitted to use its default. Lines beginning with '#' are
# comments. Whitespace around the key, '=', and value is trimmed.

# TCP address to listen on.
addr                = 0.0.0.0:11211

# HTTP address for net/http/pprof handlers; empty disables.
pprof-addr          =

# Number of independently-locked store shards.
shards              = 16

# Maximum bytes allowed in a single value.
max-value-bytes     = 1048576

# Maximum accounted key/value bytes before LRU eviction.
max-memory-bytes    = 67108864

# Per-item overhead included in memory accounting.
item-overhead-bytes = 64

# Interval for the periodic expired-key sweep; '0s' disables.
cleanup-interval    = 1m

# TLS — set both paths to enable; both empty leaves the listener plain TCP.
# Setting only one is a configuration error.
tls-cert            =
tls-key             =

# Bearer token required as the first command on each connection
# (`AUTH <token>\r\n`). Empty disables authentication.
auth-token          =

# Per-connection idle timeout. The read deadline is reset before each
# command; a connection that doesn't send within this window is closed.
# '0s' disables.
idle-timeout        = 5m

# Hard cap on concurrent connections. Past the cap, new connections
# receive `SERVER_ERROR max connections reached` and are closed. '0'
# disables the cap.
max-connections     = 1024

# Time the server waits for in-flight connections to drain after SIGTERM
# before force-closing them.
shutdown-timeout    = 10s
